<h3 class="text-center">Login</h3>

<form action="" method="POST" style="width:500px; margin:auto;">
    <div class="form-group mb-2">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" class="form-control" placeholder="name@example.com">
    </div>
    <div class="form-group mb-3">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" class="form-control" placeholder="Enter your password">
    </div>

    <button type="submit" class="btn btn-warning">Login</button>
</form>
