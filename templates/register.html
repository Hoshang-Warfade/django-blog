<h3 class="text-center">Register</h3>
<form action="" method="POST" style="width:500px; margin:auto;">
    <div class="form-group mb-2">
        <label for="regName">Full Name</label>
        <input id="regName" type="text" class="form-control" placeholder="Your full name">
    </div>
    <div class="form-group mb-2">
        <label for="regUsername">Username</label>
        <input id="regUsername" type="text" class="form-control" placeholder="Choose a username">
    </div>
    <div class="form-group mb-2">
        <label for="regEmail">Email</label>
        <input id="regEmail" type="email" class="form-control" placeholder="name@example.com">
    </div>
    <div class="form-group mb-3">
        <label for="regPassword">Password</label>
        <input id="regPassword" type="password" class="form-control" placeholder="Create a password">
    </div>

    <button type="submit" class="btn btn-warning">Submit</button>
</form>
