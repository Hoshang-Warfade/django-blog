    <div class="col-md-9">
        <h2>Edit Blog Post</h2>
        <form action="" method="POST" enctype="multipart/form-data">
            <div class="form-group mb-2">
                <label for="editPostTitle">Title</label>
                <input id="editPostTitle" type="text" class="form-control" value="Static To Dynamic UI Workflow">
            </div>
            <div class="form-group mb-2">
                <label for="editPostDescription">Short Description</label>
                <textarea id="editPostDescription" class="form-control" rows="3">Prototype with static content first and then wire dynamic fields.</textarea>
            </div>
            <div class="form-group mb-2">
                <label for="editPostImage">Featured Image</label>
                <input id="editPostImage" type="file" class="form-control">
            </div>
            <button type="submit" class="btn btn-warning">Submit</button>
        </form>
        <br>
    </div>
