{% extends 'base.html' %}
{% block content %}
<div class="row">
    {% include 'dashboard/sidebar.html' %}
    {% load crispy_forms_tags %}

    <div class="col-md-9">
        {% if perms.auth.add_user %}
        <h2>Add New User</h2>
        <form action="{% url 'add_user' %}" method="POST">
            {% csrf_token %}
            {{ form |crispy }} 
            <button type="submit" class="btn btn-warning">Submit</button>
        </form>
        <br>
        {% else %}
        <h5>You do not have permission to add users.</h5>
        {% endif %}
    </div>
</div>
{% endblock %}
