<div class="row">
    <div class="col-md-3">
        <div class="nav flex-column nav-pills bg-light" aria-orientation="vertical">
            <a href="dashboard.html" class="nav-link text-dark">Dashboard</a>
            <a href="users.html" class="nav-link text-dark">Users</a>
            <a href="categories.html" class="nav-link text-dark">Categories</a>
            <a href="posts.html" class="nav-link text-dark bg-warning">Posts</a>
            <a href="#" class="nav-link text-dark">Logout</a>
        </div>
    </div>

    <div class="col-md-9">
        <h2>Add New Post</h2>
        <form action="" method="POST" enctype="multipart/form-data">
            <div class="form-group mb-2">
                <label for="postTitle">Title</label>
                <input id="postTitle" type="text" class="form-control" placeholder="Post title">
            </div>
            <div class="form-group mb-2">
                <label for="postCategory">Category</label>
                <select id="postCategory" class="form-control">
                    <option>Technology</option>
                    <option>Design</option>
                    <option>Business</option>
                </select>
            </div>
            <div class="form-group mb-2">
                <label for="postDescription">Short Description</label>
                <textarea id="postDescription" class="form-control" rows="3"></textarea>
            </div>
            <div class="form-group mb-2">
                <label for="postImage">Featured Image</label>
                <input id="postImage" type="file" class="form-control">
            </div>
            <button type="submit" class="btn btn-warning">Submit</button>
        </form>
        <br>
    </div>
</div>
